name: Create Release from Changelog

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract changelog (reliable)
        run: |
          VERSION=${{ steps.version.outputs.version }}

          sed 's/\r$//' CHANGELOG.md > clean.md

          echo "## Unreleased" > notes.md
          sed -n '/^## \[Unreleased\]/,/^## \[/p' clean.md | tail -n +2 >> notes.md

          echo "" >> notes.md

          sed -n "/^## \[$VERSION\]/,/^## \[/p" clean.md | tail -n +2 >> notes.md

      # Debug
      - name: Debug files
        run: |
          echo "Release Content:"
          ls -R ./build/bin/Release || true

      # ZIP SECURE
      - name: Create zip
        run: |
          mkdir -p dist
          zip -j dist/release.zip ./build/bin/Release/FrostformEngine.exe

          echo "Distribution Content:"
          ls -l dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: notes.md
          files: |
            dist/release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}