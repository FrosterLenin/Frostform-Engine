name: Create Release from Changelog

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract changelog (reliable)
        run: |
          VERSION=${{ steps.version.outputs.version }}

          sed 's/\r$//' CHANGELOG.md > clean.md

          # Extract Unreleased section
          echo "## Unreleased" > notes.md
          sed -n '/^## \[Unreleased\]/,/^## \[/p' clean.md | tail -n +2 >> notes.md

          echo "" >> notes.md

          # Extract version section
          sed -n "/^## \[$VERSION\]/,/^## \[/p" clean.md | tail -n +2 >> notes.md

          echo "----- DEBUG OUTPUT -----"
          cat notes.md

      # Debug: check what's actually inside Release
      - name: Debug build output
        run: |
          echo "Listing Release folder:"
          ls -R ./build/bin/Release || echo "Folder not found"

      # Create zip from Release folder
      - name: Create release zip
        run: |
          if [ -d "./build/bin/Release" ]; then
            cd ./build/bin/Release
            zip -r release.zip .
          else
            echo "ERROR: ./build/bin/Release does not exist"
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: notes.md
          files: |
            ./build/bin/Release/release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}