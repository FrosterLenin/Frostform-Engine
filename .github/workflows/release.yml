name: Create Release from Changelog

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract changelog (fixed)
        run: |
          VERSION=${{ steps.version.outputs.version }}

          # normalize file (fix Windows line endings)
          sed 's/\r$//' CHANGELOG.md > clean.md

          # start notes file
          echo "## Unreleased" > notes.md

          # extract Unreleased section
          awk '/^## \[Unreleased\]/{flag=1; next} /^## \[/{flag=0} flag' clean.md >> notes.md

          echo "" >> notes.md

          # extract version section
          awk "/^## \\[$VERSION\\]/{flag=1; next} /^## \\[/{flag=0} flag" clean.md >> notes.md

          echo "----- DEBUG OUTPUT -----"
          cat notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}