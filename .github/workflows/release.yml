name: Create Release from Changelog

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          $version = $ref -replace '^v', ''
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Extract changelog (Unreleased + Version)
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"

          # Normalize line endings
          (Get-Content CHANGELOG.md) -replace "`r", "" | Set-Content clean.md
          $content = Get-Content clean.md

          function Get-Section($pattern) {
            $start = ($content | Select-String $pattern).LineNumber
            if (-not $start) { return @() }

            $end = ($content | Select-String "^## \[" | Where-Object { $_.LineNumber -gt $start } | Select-Object -First 1).LineNumber

            if ($end) {
              return $content[($start-1)..($end-2)]
            } else {
              return $content[($start-1)..($content.Length-1)]
            }
          }

          $unreleased = Get-Section "^## \[Unreleased\]"
          $versionSec = Get-Section "^## \[$version\]"

          if (-not $versionSec -or $versionSec.Count -eq 0) {
            Write-Error "Version $version not found in CHANGELOG.md"
            exit 1
          }

          $output = @()

          if ($unreleased.Count -gt 0) {
            $output += $unreleased
            $output += ""
            $output += "---"
            $output += ""
          }

          $output += $versionSec

          $output | Set-Content notes.md

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Create zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist

          $exe = Get-ChildItem -Recurse -Path build -Filter "FrostformEngine.exe" | Select-Object -First 1

          if (-not $exe) {
            Write-Error "FrostformEngine.exe not found"
            exit 1
          }

          Compress-Archive -Path $exe.FullName -DestinationPath "dist/FrostformEngine-${{ github.ref_name }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: notes.md
          files: |
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}