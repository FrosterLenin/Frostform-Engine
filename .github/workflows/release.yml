name: Create Release from Changelog

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $env:GITHUB_OUTPUT

      - name: Extract changelog (reliable)
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"

          (Get-Content CHANGELOG.md) -replace "`r", "" | Set-Content clean.md

          "## Unreleased" | Set-Content notes.md
          $content = Get-Content clean.md

          $start = ($content | Select-String "^## \[Unreleased\]").LineNumber
          $end = ($content | Select-String "^## \[" | Where-Object { $_.LineNumber -gt $start } | Select-Object -First 1).LineNumber

          if ($start) {
            if ($end) {
              $content[$start..($end-2)] | Add-Content notes.md
            } else {
              $content[$start..($content.Length-1)] | Add-Content notes.md
            }
          }

          "" | Add-Content notes.md

          $startV = ($content | Select-String "^## \[$version\]").LineNumber
          $endV = ($content | Select-String "^## \[" | Where-Object { $_.LineNumber -gt $startV } | Select-Object -First 1).LineNumber

          if ($startV) {
            if ($endV) {
              $content[$startV..($endV-2)] | Add-Content notes.md
            } else {
              $content[$startV..($content.Length-1)] | Add-Content notes.md
            }
          }

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Debug output
        shell: pwsh
        run: |
          Write-Host "===== BUILD TREE ====="
          Get-ChildItem -Recurse build

      - name: Create zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist

          $exe = Get-ChildItem -Recurse -Path build -Filter "FrostformEngine.exe" | Select-Object -First 1

          if (-not $exe) {
            Write-Error "FrostformEngine.exe not found"
            exit 1
          }

          Write-Host "Found exe: $($exe.FullName)"

          Compress-Archive -Path $exe.FullName -DestinationPath "dist/FrostformEngine-${{ github.ref_name }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: notes.md
          files: |
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}